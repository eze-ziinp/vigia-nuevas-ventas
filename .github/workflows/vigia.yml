name: Vigía Nuevas Ventas

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: vigia
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Correr vigia
        env:
          CLIENTIFY_TOKEN: ${{ secrets.CLIENTIFY_TOKEN }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL: C0BJ8KK37J7
        run: node vigia.js

      - name: Guardar estado si cambio
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "vigia-bot"
            git config user.email "vigia@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "sin cambios en state.json"
          fi
